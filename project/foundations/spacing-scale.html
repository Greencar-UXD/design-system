<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing Scale" subtitle="4px base grid · 0 → 96" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-card);font-family:var(--font-text);-webkit-font-smoothing:antialiased;}
  .wrap{padding:24px 28px;display:flex;flex-direction:column;gap:9px;}
  .row{display:flex;align-items:center;gap:14px;}
  .tok{width:78px;font:var(--text-mono);font-size:11px;color:var(--text-secondary);flex:none;}
  .px{width:42px;font:var(--text-mono);font-size:11px;color:var(--text-tertiary);flex:none;text-align:right;}
  .bar{height:14px;border-radius:var(--radius-xs);background:var(--cobalt-500);}
</style>
</head>
<body>
<div class="wrap" id="wrap"></div>
<script>
  const steps = [[1,4],[2,8],[3,12],[4,16],[5,20],[6,24],[8,32],[10,40],[12,48],[16,64]];
  document.getElementById('wrap').innerHTML = steps.map(([t,px]) =>
    `<div class="row"><span class="tok">--space-${t}</span><span class="px">${px}</span><span class="bar" style="width:${px}px"></span></div>`
  ).join('');
</script>
</body>
</html>
