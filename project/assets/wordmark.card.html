<!-- @dsCard group="Brand" viewport="700x200" name="Wordmark (placeholder)" subtitle="Typographic lockup — pending a real logo" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-card);font-family:var(--font-display);-webkit-font-smoothing:antialiased;}
  .wrap{padding:34px 36px;display:flex;align-items:center;gap:44px;flex-wrap:wrap;}
  .mark{display:inline-flex;align-items:center;gap:10px;font-weight:var(--fw-bold);font-size:34px;letter-spacing:var(--ls-tight);color:var(--text-primary);}
  .mark .dot{width:13px;height:13px;border-radius:50%;background:var(--accent);transform:translateY(2px);}
  .mark.inv{background:var(--surface-inverse);color:var(--text-inverse);padding:16px 22px;border-radius:var(--radius-lg);}
  .note{font-family:var(--font-text);font:var(--text-caption);color:var(--text-tertiary);max-width:200px;}
</style>
</head>
<body>
<div class="wrap">
  <span class="mark">Cobalt<span class="dot"></span></span>
  <span class="mark inv">Cobalt<span class="dot"></span></span>
  <span class="note">Placeholder wordmark — Pretendard Bold + cobalt dot. Replace with a real logo when available.</span>
</div>
</body>
</html>
