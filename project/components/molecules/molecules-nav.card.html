<!-- @dsCard group="Molecules" viewport="700x440" name="Navigation molecules" subtitle="Tabs · Segmented · Breadcrumb · Pagination · Stepper · Menu · Tooltip" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;background:var(--surface-card);font-family:var(--font-text);-webkit-font-smoothing:antialiased;}
  .wrap{padding:26px 28px;display:flex;flex-direction:column;gap:20px;}
  .glabel{font:var(--text-caption);font-weight:var(--fw-semibold);letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--text-tertiary);margin-bottom:10px;display:block;}
  .rowflex{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
  .between{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;}
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Tabs, SegmentedControl, Breadcrumb, Pagination, Stepper, Menu, Tooltip, Button, IconButton } = window.DesignSystem_d67542;
  const Dots = () => <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>;
  const Gear = () => <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>;

  function Demo(){
    const [tab,setTab] = React.useState('work');
    const [view,setView] = React.useState('list');
    const [page,setPage] = React.useState(3);
    return (
      <React.Fragment>
        <div>
          <span className="glabel">Breadcrumb · Stepper</span>
          <Breadcrumb items={[{label:'홈',onClick:()=>{}},{label:'작업',onClick:()=>{}},{label:'가계부 앱 리디자인'}]} />
          <div style={{marginTop:'14px'}}><Stepper current={1} steps={['배송지','결제','확인']} /></div>
        </div>
        <div>
          <span className="glabel">Tabs · Segmented</span>
          <Tabs value={tab} onChange={setTab} tabs={[{value:'work',label:'작업'},{value:'about',label:'소개'},{value:'contact',label:'연락처'}]} />
          <div style={{marginTop:'14px'}}><SegmentedControl value={view} onChange={setView} options={[{value:'list',label:'목록'},{value:'grid',label:'그리드'}]} /></div>
        </div>
        <div className="between">
          <div>
            <span className="glabel">Pagination</span>
            <Pagination page={page} total={12} onChange={setPage} />
          </div>
          <div>
            <span className="glabel">Menu · Tooltip</span>
            <div className="rowflex">
              <Menu align="right" trigger={<IconButton icon={<Dots/>} label="더보기" variant="outline" />}
                items={[{label:'편집',onClick:()=>{}},{label:'복제',onClick:()=>{}},{separator:true},{label:'삭제',danger:true,onClick:()=>{}}]} />
              <Tooltip content="설정" side="top"><IconButton icon={<Gear/>} label="설정" /></Tooltip>
              <Tooltip content="위쪽 툴팁" side="top"><Button variant="secondary">Hover</Button></Tooltip>
            </div>
          </div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
