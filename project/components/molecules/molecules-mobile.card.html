<!-- @dsCard group="Molecules" viewport="700x560" name="Mobile molecules" subtitle="AppBar · ListRow · BottomNav" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;background:var(--surface-sunken);font-family:var(--font-text);-webkit-font-smoothing:antialiased;}
  .wrap{padding:24px;display:flex;justify-content:center;}
  .phone{width:340px;height:496px;background:var(--surface-page);border:1px solid var(--border-strong);border-radius:28px;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);}
  .screen{flex:1;overflow:auto;}
  .sec{padding:16px 16px 8px;font:var(--text-caption);font-weight:var(--fw-semibold);letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--text-tertiary);}
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { AppBar, BottomNav, ListRow, IconButton, Avatar, Switch } = window.DesignSystem_d67542;
  const S = (p) => <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{p}</svg>;
  const Menu = () => S(<><path d="M4 12h16M4 6h16M4 18h16"/></>);
  const Bell = () => S(<><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></>);
  const Home = () => S(<><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></>);
  const Search = () => S(<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>);
  const User = () => S(<><circle cx="12" cy="8" r="4"/><path d="M6 21v-1a6 6 0 0 1 12 0v1"/></>);
  const Chev = () => S(<path d="m9 18 6-6-6-6"/>);

  function Demo(){
    const [tab,setTab] = React.useState('home');
    return (
      <div className="phone">
        <AppBar title="홈" align="left"
          left={<IconButton icon={<Menu/>} label="메뉴" />}
          right={<IconButton icon={<Bell/>} label="알림" />} />
        <div className="screen">
          <div className="sec">계정</div>
          <ListRow leading={<Avatar name="박지우" size="sm" />} title="박지우" subtitle="jiwoo@email.com" trailing={<Chev/>} onClick={()=>{}} />
          <div className="sec">설정</div>
          <ListRow title="알림" trailing={<Switch defaultChecked />} />
          <ListRow title="다크 모드" trailing={<Switch />} />
          <ListRow title="언어" subtitle="한국어" trailing={<Chev/>} onClick={()=>{}} />
        </div>
        <BottomNav value={tab} onChange={setTab} items={[
          {value:'home',label:'홈',icon:<Home/>},
          {value:'search',label:'검색',icon:<Search/>},
          {value:'me',label:'내정보',icon:<User/>},
        ]} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
