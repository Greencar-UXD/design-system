<!-- @dsCard group="Molecules" viewport="700x520" name="Content molecules" subtitle="Card · Stat · Alert · Toast · Accordion · EmptyState" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;background:var(--surface-page);font-family:var(--font-text);-webkit-font-smoothing:antialiased;}
  .wrap{padding:26px 28px;display:flex;flex-direction:column;gap:20px;}
  .glabel{font:var(--text-caption);font-weight:var(--fw-semibold);letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--text-tertiary);margin-bottom:10px;display:block;}
  .statgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start;}
  .pad{padding:18px;}
  .stack{display:flex;flex-direction:column;gap:10px;}
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Card, Stat, Alert, Toast, Accordion, EmptyState, Button } = window.DesignSystem_d67542;
  const Inbox = () => <svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.5 5.5 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.5-6.5A2 2 0 0 0 16.8 4H7.2a2 2 0 0 0-1.7 1.5Z"/></svg>;
  function Demo(){
    return (
      <React.Fragment>
        <div>
          <span className="glabel">Stat (in Card)</span>
          <div className="statgrid">
            <Card><Stat label="월간 매출" value="₩23.8M" delta="+12%" trend="up" /></Card>
            <Card><Stat label="활성 사용자" value="1,240" delta="+4.1%" trend="up" /></Card>
            <Card><Stat label="이탈률" value="3.4%" delta="−0.8%" trend="down" /></Card>
          </div>
        </div>
        <div>
          <span className="glabel">Alert · Toast</span>
          <div className="cols">
            <div className="stack">
              <Alert variant="success" title="저장됨">변경 사항이 반영되었습니다.</Alert>
              <Alert variant="warning">결제 정보를 확인해 주세요.</Alert>
              <Alert variant="danger" title="오류" onClose={()=>{}}>네트워크 연결을 확인하세요.</Alert>
            </div>
            <Toast variant="success" title="업로드 완료" onClose={()=>{}}>파일이 저장되었습니다.</Toast>
          </div>
        </div>
        <div className="cols">
          <div>
            <span className="glabel">Accordion</span>
            <Accordion defaultOpen={[0]} items={[
              {title:'배송은 얼마나 걸리나요?', content:'영업일 기준 2–3일 소요됩니다.'},
              {title:'환불 정책', content:'수령 후 7일 이내 무료 반품이 가능합니다.'},
            ]} />
          </div>
          <div>
            <span className="glabel">Empty state</span>
            <Card padded={false}>
              <EmptyState icon={<Inbox/>} title="아직 작업이 없어요"
                description="첫 프로젝트를 추가하면 여기에 표시됩니다."
                action={<Button variant="accent" size="sm">프로젝트 추가</Button>} />
            </Card>
          </div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
