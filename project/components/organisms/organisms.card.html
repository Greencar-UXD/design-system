<!-- @dsCard group="Organisms" viewport="700x400" name="Organisms" subtitle="Dialog · Drawer · Popover · BottomSheet · Table" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;background:var(--surface-page);font-family:var(--font-text);-webkit-font-smoothing:antialiased;}
  .wrap{padding:26px 28px;display:flex;flex-direction:column;gap:20px;}
  .glabel{font:var(--text-caption);font-weight:var(--fw-semibold);letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--text-tertiary);margin-bottom:10px;display:block;}
  .rowflex{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Dialog, Drawer, Popover, BottomSheet, Table, Badge, Button, ListRow } = window.DesignSystem_d67542;
  function Demo(){
    const [dialog,setDialog] = React.useState(false);
    const [drawer,setDrawer] = React.useState(false);
    const [sheet,setSheet] = React.useState(false);
    return (
      <React.Fragment>
        <div>
          <span className="glabel">Overlays</span>
          <div className="rowflex">
            <Button onClick={()=>setDialog(true)}>Dialog</Button>
            <Button variant="ghost" onClick={()=>setDrawer(true)}>Drawer</Button>
            <Button variant="ghost" onClick={()=>setSheet(true)}>Bottom sheet</Button>
            <Popover align="left" trigger={<Button variant="secondary">Popover</Button>}>
              <div style={{display:'flex',flexDirection:'column',gap:'8px',font:'var(--text-body-sm)',color:'var(--text-secondary)'}}>
                <strong style={{color:'var(--text-primary)'}}>기간 필터</strong>오늘 · 이번 주 · 이번 달
              </div>
            </Popover>
          </div>
        </div>
        <div>
          <span className="glabel">Table</span>
          <Table rowKey="id"
            columns={[
              { key:'name', label:'이름' },
              { key:'role', label:'역할' },
              { key:'status', label:'상태', align:'center', render:(v)=> <Badge variant={v==='활성'?'success':'neutral'} dot>{v}</Badge> },
              { key:'amount', label:'금액', align:'right' },
            ]}
            rows={[
              { id:1, name:'박지우', role:'프로덕트 디자이너', status:'활성', amount:'₩1,200,000' },
              { id:2, name:'김코발', role:'프론트엔드', status:'대기', amount:'₩980,000' },
              { id:3, name:'이그레이', role:'PM', status:'활성', amount:'₩1,450,000' },
            ]} />
        </div>
        <Dialog open={dialog} onClose={()=>setDialog(false)} title="작업을 삭제할까요?"
          footer={<React.Fragment>
            <Button variant="ghost" onClick={()=>setDialog(false)}>취소</Button>
            <Button variant="danger" onClick={()=>setDialog(false)}>삭제</Button>
          </React.Fragment>}>
          이 작업은 되돌릴 수 없습니다. 정말 삭제하시겠어요?
        </Dialog>
        <Drawer open={drawer} onClose={()=>setDrawer(false)} side="right" title="필터"
          footer={<Button variant="accent" onClick={()=>setDrawer(false)}>적용</Button>}>
          우측에서 슬라이드되는 상세 패널입니다.
        </Drawer>
        <BottomSheet open={sheet} onClose={()=>setSheet(false)} title="옵션">
          <ListRow title="공유" onClick={()=>setSheet(false)} />
          <ListRow title="삭제" onClick={()=>setSheet(false)} />
        </BottomSheet>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
