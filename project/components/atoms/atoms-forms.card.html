<!-- @dsCard group="Atoms" viewport="700x460" name="Form atoms" subtitle="Button · IconButton · Input · Select · Checkbox · Radio · Switch · Slider" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;background:var(--surface-card);font-family:var(--font-text);-webkit-font-smoothing:antialiased;}
  .wrap{padding:26px 28px;display:flex;flex-direction:column;gap:22px;}
  .group{display:flex;flex-direction:column;gap:10px;}
  .glabel{font:var(--text-caption);font-weight:var(--fw-semibold);letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--text-tertiary);}
  .rowflex{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .stack-sm{display:flex;flex-direction:column;gap:12px;}
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, IconButton, Input, Select, Checkbox, Radio, Switch, Slider } = window.DesignSystem_d67542;
  const S = (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{p}</svg>;
  const Search = () => S(<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>);
  const Plus = () => S(<><path d="M5 12h14"/><path d="M12 5v14"/></>);
  const Gear = () => S(<><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></>);
  const ArrowRight = () => S(<><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>);

  function Demo(){
    const [v,setV] = React.useState(40);
    return (
      <React.Fragment>
        <div className="group">
          <span className="glabel">Button · IconButton</span>
          <div className="rowflex">
            <Button>Primary</Button>
            <Button variant="accent">Accent</Button>
            <Button variant="secondary">Secondary</Button>
            <Button variant="ghost">Ghost</Button>
            <Button variant="danger">Danger</Button>
            <Button disabled>Disabled</Button>
          </div>
          <div className="rowflex">
            <Button size="sm" icon={<Plus/>}>추가</Button>
            <Button variant="accent" iconRight={<ArrowRight/>}>시작하기</Button>
            <Button size="lg" variant="secondary" icon={<Search/>}>검색</Button>
            <IconButton icon={<Gear/>} label="설정" />
            <IconButton icon={<Gear/>} label="설정" variant="outline" />
            <IconButton icon={<ArrowRight/>} label="다음" variant="solid" />
          </div>
        </div>
        <div className="cols">
          <div className="stack-sm">
            <Input label="이메일" placeholder="you@example.com" />
            <Input label="검색" icon={<Search/>} placeholder="검색어 입력" />
          </div>
          <div className="stack-sm">
            <Input label="비밀번호" type="password" defaultValue="1234" error="8자 이상 입력하세요" />
            <Select label="정렬" options={['최신순','인기순','이름순']} />
          </div>
        </div>
        <div className="group">
          <span className="glabel">Selection · Slider</span>
          <div className="rowflex" style={{gap:'22px'}}>
            <Checkbox label="약관 동의" defaultChecked />
            <Radio name="p" label="무료" defaultChecked />
            <Radio name="p" label="프로" />
            <Switch label="알림 받기" defaultChecked />
            <Switch label="다크 모드" />
          </div>
          <div style={{maxWidth:'320px'}}><Slider label="투명도" value={v} onChange={setV} showValue /></div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
