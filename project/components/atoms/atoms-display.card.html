<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{margin:0;background:var(--surface-card);font-family:var(--font-text);-webkit-font-smoothing:antialiased;}
  .wrap{padding:26px 28px;display:flex;flex-direction:column;gap:20px;}
  .glabel{font:var(--text-caption);font-weight:var(--fw-semibold);letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--text-tertiary);margin-bottom:10px;display:block;}
  .rowflex{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:center;}
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Badge, Tag, Avatar, Divider, Skeleton, Spinner, Progress } = window.DesignSystem_d67542;
  function Demo(){
    return (
      <React.Fragment>
        <div>
          <span className="glabel">Badge · Tag</span>
          <div className="rowflex">
            <Badge variant="accent">New</Badge>
            <Badge variant="success" dot>운영중</Badge>
            <Badge variant="warning">대기</Badge>
            <Badge variant="danger" dot>오류</Badge>
            <Badge variant="outline">v2.0</Badge>
            <Badge variant="solid">Pro</Badge>
            <Tag>디자인</Tag>
            <Tag onRemove={()=>{}}>React</Tag>
          </div>
        </div>
        <div>
          <span className="glabel">Avatar</span>
          <div className="rowflex">
            <Avatar name="AB" size="xs" />
            <Avatar name="김디자인" size="sm" />
            <Avatar name="홍길동" size="md" status />
            <Avatar name="이코발" size="lg" />
            <Avatar name="SQ" size="md" square />
          </div>
        </div>
        <div className="cols">
          <div>
            <span className="glabel">Skeleton · Divider</span>
            <div style={{display:'flex',gap:'12px',alignItems:'center'}}>
              <Skeleton variant="circle" width={44} height={44} />
              <div style={{flex:1,display:'flex',flexDirection:'column',gap:'8px'}}>
                <Skeleton variant="text" width="70%" />
                <Skeleton variant="text" width="45%" />
              </div>
            </div>
            <div style={{margin:'14px 0'}}><Divider label="또는" /></div>
          </div>
          <div>
            <span className="glabel">Progress · Spinner</span>
            <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
              <Progress value={62} />
              <Progress indeterminate />
              <div className="rowflex" style={{marginTop:'4px'}}>
                <Spinner size="sm" /><Spinner size="md" /><Spinner size="lg" />
              </div>
            </div>
          </div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
