<!-- @dsCard group="Type" viewport="700x260" name="Weights" subtitle="Pretendard 400 · 500 · 600 · 700" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-card);color:var(--text-primary);font-family:var(--font-text);-webkit-font-smoothing:antialiased;}
  .wrap{padding:28px 32px;display:flex;flex-direction:column;gap:16px;}
  .row{display:flex;align-items:baseline;gap:20px;}
  .row .meta{flex:none;width:130px;font:var(--text-mono);font-size:11px;color:var(--text-tertiary);}
  .sample{font-size:26px;letter-spacing:var(--ls-snug);}
  .w4{font-weight:400} .w5{font-weight:500} .w6{font-weight:600} .w7{font-weight:700}
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="meta">Regular · 400</span><span class="sample w4">디자인 시스템 Design 0123</span></div>
  <div class="row"><span class="meta">Medium · 500</span><span class="sample w5">디자인 시스템 Design 0123</span></div>
  <div class="row"><span class="meta">SemiBold · 600</span><span class="sample w6">디자인 시스템 Design 0123</span></div>
  <div class="row"><span class="meta">Bold · 700</span><span class="sample w7">디자인 시스템 Design 0123</span></div>
</div>
</body>
</html>
