<!-- @dsCard group="Type" viewport="700x230" name="Numeric · Tabular" subtitle="Pretendard · tabular figures (tabular-nums)" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-card);color:var(--text-primary);font-family:var(--font-text);-webkit-font-smoothing:antialiased;}
  .wrap{padding:28px 32px;display:flex;flex-direction:column;gap:16px;}
  .label{font:var(--text-caption);font-weight:var(--fw-semibold);letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--text-tertiary);}
  .nums{font-size:30px;font-weight:500;letter-spacing:-0.01em;font-variant-numeric:tabular-nums;}
  .rows{display:flex;flex-direction:column;gap:2px;font-variant-numeric:tabular-nums;}
  .rows span{display:block;text-align:right;width:160px;font-size:15px;color:var(--text-secondary);}
  .note{font:var(--text-caption);color:var(--text-tertiary);}
</style>
</head>
<body>
<div class="wrap">
  <div class="label">Tabular figures · single family</div>
  <div class="nums">$1,284,950.00 · 99.98% · +12.4%</div>
  <div class="rows">
    <span>1,284,950</span>
    <span>   45,012</span>
    <span>  980,760</span>
  </div>
  <div class="note">Pretendard 한 패밀리. 숫자 정렬은 <code>font-variant-numeric: tabular-nums</code> — 별도 모노 폰트 없음.</div>
</div>
</body>
</html>
