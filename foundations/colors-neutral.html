<!-- @dsCard group="Colors" viewport="700x180" name="Neutral Ramp" subtitle="Gray 0 → 950, cool-leaning" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-card);font-family:var(--font-text);-webkit-font-smoothing:antialiased;}
  .wrap{padding:26px 28px;}
  .ramp{display:grid;grid-template-columns:repeat(12,1fr);gap:8px;}
  .sw{display:flex;flex-direction:column;gap:8px;}
  .chip{height:64px;border-radius:var(--radius-md);box-shadow:inset 0 0 0 1px rgba(16,18,29,.08);}
  .lbl{font:var(--text-mono);font-size:10px;color:var(--text-tertiary);text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <div class="ramp" id="ramp"></div>
</div>
<script>
  const steps = [0,50,100,200,300,400,500,600,700,800,900,950];
  document.getElementById('ramp').innerHTML = steps.map(s =>
    `<div class="sw"><div class="chip" style="background:var(--gray-${s})"></div><div class="lbl">${s}</div></div>`
  ).join('');
</script>
</body>
</html>
