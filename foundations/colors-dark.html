<!-- @dsCard group="Colors" viewport="700x230" name="Semantic · Dark" subtitle="Dark theme surfaces, text, accent" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-page);font-family:var(--font-text);-webkit-font-smoothing:antialiased;}
  .wrap{padding:24px 28px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .grp{display:flex;flex-direction:column;gap:8px;}
  .grp h4{font:var(--text-caption);font-weight:var(--fw-semibold);letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--text-tertiary);margin:0 0 2px;}
  .row{display:flex;align-items:center;gap:9px;}
  .dot{width:22px;height:22px;border-radius:var(--radius-sm);flex:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);}
  .name{font:var(--text-mono);font-size:11px;color:var(--text-secondary);}
</style>
</head>
<body>
<div class="wrap">
  <div class="grp">
    <h4>Text</h4>
    <div class="row"><span class="dot" style="background:var(--text-primary)"></span><span class="name">primary</span></div>
    <div class="row"><span class="dot" style="background:var(--text-secondary)"></span><span class="name">secondary</span></div>
    <div class="row"><span class="dot" style="background:var(--text-tertiary)"></span><span class="name">tertiary</span></div>
    <div class="row"><span class="dot" style="background:var(--text-link)"></span><span class="name">link</span></div>
  </div>
  <div class="grp">
    <h4>Surface</h4>
    <div class="row"><span class="dot" style="background:var(--surface-page)"></span><span class="name">page</span></div>
    <div class="row"><span class="dot" style="background:var(--surface-card)"></span><span class="name">card</span></div>
    <div class="row"><span class="dot" style="background:var(--surface-sunken)"></span><span class="name">sunken</span></div>
    <div class="row"><span class="dot" style="background:var(--surface-inverse)"></span><span class="name">inverse</span></div>
  </div>
  <div class="grp">
    <h4>Border</h4>
    <div class="row"><span class="dot" style="background:var(--border)"></span><span class="name">border</span></div>
    <div class="row"><span class="dot" style="background:var(--border-strong)"></span><span class="name">strong</span></div>
    <div class="row"><span class="dot" style="background:var(--border-accent)"></span><span class="name">accent</span></div>
  </div>
  <div class="grp">
    <h4>Accent / Action</h4>
    <div class="row"><span class="dot" style="background:var(--accent)"></span><span class="name">accent</span></div>
    <div class="row"><span class="dot" style="background:var(--accent-hover)"></span><span class="name">hover</span></div>
    <div class="row"><span class="dot" style="background:var(--action-primary-bg)"></span><span class="name">action bg</span></div>
    <div class="row"><span class="dot" style="background:var(--surface-accent-subtle)"></span><span class="name">subtle</span></div>
  </div>
</div>
</body>
</html>
