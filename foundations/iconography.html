<!-- @dsCard group="Brand" viewport="700x230" name="Iconography · Lucide" subtitle="Monoline · stroke 2 · currentColor" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-card);font-family:var(--font-text);-webkit-font-smoothing:antialiased;}
  .wrap{padding:26px 28px;display:flex;flex-direction:column;gap:18px;}
  .icons{display:flex;gap:20px;align-items:center;color:var(--text-secondary);flex-wrap:wrap;}
  .icons svg{width:24px;height:24px;}
  .sizes{display:flex;gap:22px;align-items:center;color:var(--text-primary);}
  .sizes .s svg{display:block;}
  .note{display:flex;gap:10px;flex-wrap:wrap;}
  .pill{font:var(--text-mono);font-size:11px;color:var(--text-secondary);background:var(--surface-sunken);border:1px solid var(--border);border-radius:var(--radius-pill);padding:6px 12px;}
  .pill b{color:var(--text-primary);font-weight:600;}
  .acc{color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">
  <div class="icons" id="row"></div>
  <div class="sizes" id="sizes"></div>
  <div class="note">
    <span class="pill">set · <b>Lucide</b></span>
    <span class="pill">stroke · <b>2</b></span>
    <span class="pill">color · <b>currentColor</b></span>
    <span class="pill">sizes · <b>16 / 20 / 24</b></span>
  </div>
</div>
<script>
  const P = {
    search:'<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
    home:'<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/>',
    settings:'<circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>',
    bell:'<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>',
    user:'<circle cx="12" cy="8" r="4"/><path d="M6 21v-1a6 6 0 0 1 12 0v1"/>',
    heart:'<path d="M19 14c1.5-1.5 3-3.2 3-5.5A5.5 5.5 0 0 0 12 5 5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4 3 5.5l7 7Z"/>',
    check:'<path d="M20 6 9 17l-5-5"/>',
    arrow:'<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>',
    plus:'<path d="M5 12h14"/><path d="M12 5v14"/>',
    calendar:'<rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/>',
  };
  const svg = (d, cls='') => `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
  document.getElementById('row').innerHTML = Object.values(P).map(d=>svg(d)).join('');
  document.getElementById('sizes').innerHTML =
    `<span class="s" style="width:16px;height:16px">${svg(P.bell)}</span>`+
    `<span class="s" style="width:20px;height:20px">${svg(P.bell)}</span>`+
    `<span class="s" style="width:24px;height:24px">${svg(P.bell)}</span>`+
    `<span class="s acc" style="width:24px;height:24px">${svg(P.heart)}</span>`;
  document.querySelectorAll('#sizes .s svg').forEach(s=>{s.style.width='100%';s.style.height='100%';});
</script>
</body>
</html>
