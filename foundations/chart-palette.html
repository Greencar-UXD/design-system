<!-- @dsCard group="Colors" viewport="700x220" name="Data-viz palette" subtitle="Categorical · cobalt-led, on monochrome" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-card);font-family:var(--font-text);-webkit-font-smoothing:antialiased;}
  .wrap{padding:24px 28px;display:flex;gap:28px;align-items:center;}
  .ramp{display:flex;gap:8px;}
  .sw{display:flex;flex-direction:column;gap:7px;align-items:center;}
  .chip{width:54px;height:54px;border-radius:var(--radius-md);box-shadow:inset 0 0 0 1px rgba(16,18,29,.08);}
  .lbl{font:var(--text-mono);font-size:10px;color:var(--text-tertiary);}
  .bars{display:flex;align-items:flex-end;gap:7px;height:96px;}
  .bar{width:20px;border-radius:var(--radius-xs) var(--radius-xs) 0 0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="ramp" id="ramp"></div>
  <div class="bars" id="bars"></div>
</div>
<script>
  const n=[1,2,3,4,5,6];
  document.getElementById('ramp').innerHTML = n.map(i=>`<div class="sw"><div class="chip" style="background:var(--chart-${i})"></div><div class="lbl">chart-${i}</div></div>`).join('');
  const h=[70,92,54,80,40,64];
  document.getElementById('bars').innerHTML = n.map((i,k)=>`<div class="bar" style="height:${h[k]}%;background:var(--chart-${i})"></div>`).join('');
</script>
</body>
</html>
