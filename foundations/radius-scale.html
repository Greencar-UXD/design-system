<!-- @dsCard group="Spacing" viewport="700x170" name="Radius" subtitle="xs → 2xl · pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-card);font-family:var(--font-text);-webkit-font-smoothing:antialiased;}
  .wrap{padding:26px 28px;display:flex;gap:18px;align-items:flex-end;}
  .item{display:flex;flex-direction:column;gap:9px;align-items:center;}
  .box{width:72px;height:64px;background:var(--surface-sunken);border:1px solid var(--border-strong);}
  .lbl{font:var(--text-mono);font-size:11px;color:var(--text-secondary);}
  .pill{width:96px;height:42px;border-radius:var(--radius-pill);background:var(--surface-sunken);border:1px solid var(--border-strong);}
</style>
</head>
<body>
<div class="wrap">
  <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="lbl">xs · 4</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lbl">sm · 6</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lbl">md · 10</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lbl">lg · 14</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lbl">xl · 20</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="lbl">2xl · 28</span></div>
  <div class="item"><div class="pill"></div><span class="lbl">pill</span></div>
</div>
</body>
</html>
