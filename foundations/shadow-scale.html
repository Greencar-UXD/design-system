<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation" subtitle="Soft cool shadows · xs → xl" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0;background:var(--surface-page);font-family:var(--font-text);-webkit-font-smoothing:antialiased;}
  .wrap{padding:32px 28px;display:flex;gap:24px;align-items:center;justify-content:center;}
  .item{display:flex;flex-direction:column;gap:14px;align-items:center;}
  .box{width:92px;height:72px;background:var(--surface-card);border-radius:var(--radius-lg);}
  .lbl{font:var(--text-mono);font-size:11px;color:var(--text-secondary);}
</style>
</head>
<body>
<div class="wrap">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="lbl">xs</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lbl">sm</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lbl">md</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lbl">lg</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="lbl">xl</span></div>
</div>
</body>
</html>
